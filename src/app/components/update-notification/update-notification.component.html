@if (visible()) {
  <div class="update-banner" role="alert">
    <div class="update-icon">🔄</div>
    <div class="update-text">
      <strong>Update beschikbaar</strong>
      <span>Er is een nieuwe versie van IC LabelMaster</span>
    </div>
    <div class="update-actions">
      <button class="btn-reload" (click)="reload()">Update</button>
      <button class="btn-dismiss" (click)="dismiss()" aria-label="Sluiten">✕</button>
    </div>
  </div>
}
