<div class="login-page">
  <div class="login-card">
    <p class="eyebrow">Beveiligde toegang</p>
    <h1>Inloggen voor beheer database</h1>
    <p class="intro">
      Alleen geautoriseerde gebruikers mogen etiketten toevoegen, wijzigen of verwijderen.
    </p>

    <form class="login-form" (ngSubmit)="submit()">
      <label>
        <span>Gebruikersnaam</span>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          autocomplete="username"
          required>
      </label>

      <label>
        <span>Wachtwoord</span>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          required>
      </label>

      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() }}</p>
      }

      <div class="actions">
        <button type="submit" class="primary-btn" [disabled]="isSubmitting()">
          Inloggen
        </button>
        <button type="button" class="secondary-btn" (click)="goBack()">
          Annuleren
        </button>
      </div>
    </form>
  </div>
</div>
